{% extends 'irezumi/base.html' %}
{% load static %}

{% block breadcrumbs %}
    <li>{{ motif.title }}</li>
{% endblock %}

{% block content %}
    <h1>{{ motif.title }}</h1>
    {% if motif.image %}
        <img src="{% static motif.image %}" class="img-article-left" alt="{{ motif.title }}">
    {% endif %}

    {% autoescape off %}
        {{ motif.content|linebreaks }}
    {% endautoescape %}

    <div class="clear"></div>
{% endblock %}
